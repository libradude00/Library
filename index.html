<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    .modal-content {
      background: #1a1a1a;
      border-radius: 16px;
      width: 90%;
      height: 90%; /* force big modal */
      display: flex;
      flex-direction: column;
      box-shadow: 0 6px 20px rgba(0,0,0,0.9);
      border: 2px solid #e6d752;
    }
    .modal iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%; /* stretch to fill */
      background: #fff;
    }
    .close-btn {
      align-self: flex-end;
      background: #e6d752;
      color: #121212;
      border: none;
      padding: 0.5rem 1rem;
      font-weight: bold;
      border-bottom-left-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .close-btn:hover {
      background: #fff176;
    }
  </style>
</head>
<body>

<header>
  <img src="logo.png" class="logo" alt="Library Logo">
  <h1>Adam's Library</h1>
  <p>Written With Elegance And Esteem</p>
</header>

<!-- Books Section -->
<section>
  <h2 class="section-title">Books</h2>
  <main class="grid" id="bookGrid">
    <!-- JS will populate books here -->
  </main>
</section>

<!-- Poems Section -->
<section>
  <h2 class="section-title">Poems</h2>
  <main class="grid" id="poemGrid">
    <!-- JS will populate poems here -->
  </main>
</section>

<!-- Modal -->
<div id="readerModal" class="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">Close &#x2716;</button>
    <iframe id="readerFrame"></iframe>
  </div>
</div>

<footer class="footer">
  <div class="footer-container">
    <h3>Contact Me</h3>
    <p>Email: <a href="mailto:amaciver09@gmail.com">amaciver09@gmail.com</a></p>
    <p>Phone: <a href="tel:+19125722640">+1 (912) 572-2640</a></p>
    <p class="library-note">Adams Library since 2025</p>
  </div>
</footer>

<script>
  // Books data
  const books = [
    {title:"Techrot Saga", author:"AJM", cover:"books/trsc.png", file:"books/trs.pdf"},
    {title:"Academy For The Gifted", author:"AJM", cover:"books/aftg.png", file:"books/aftg.pdf"},
    {title:"In Progress", author:"AJM", cover:"books/cs.png", file:"books/book1.pdf"}
  ];

  // Poems data
  const poems = [
    {title:"Davinci's Brush", author:"AJM", cover:"books/dbc.png", file:"books/db.pdf"},
    {title:"Poem For People Pleasers", author:"AJM", cover:"books/apc.png", file:"books/ap.pdf"},
  ];

  // Function to build cards
  function buildCards(items, containerId) {
    const grid = document.getElementById(containerId);
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = "card";

      // Random tilt
      const tilt = (Math.random() * 8 - 4).toFixed(2);
      card.style.transform = `rotate(${tilt}deg)`;

      card.innerHTML = `
        <div class="card-media">
          <img src="${item.cover}" alt="${item.title} cover">
          <div class="card-brush"></div>
        </div>
        <div class="card-body">
          <h3>${item.title}</h3>
          <p>${item.author}</p>
        </div>
      `;

      // Open modal on click
      card.addEventListener("click", () => openModal(item.file));

      grid.appendChild(card);
    });
  }

  // Modal controls
  function openModal(file) {
    const modal = document.getElementById("readerModal");
    const frame = document.getElementById("readerFrame");
    // Append zoom parameter for most browsers' PDF viewer
    frame.src = file + "#zoom=125";
    modal.style.display = "flex";
  }
  function closeModal() {
    const modal = document.getElementById("readerModal");
    const frame = document.getElementById("readerFrame");
    frame.src = ""; // clear pdf to stop it from running
    modal.style.display = "none";
  }

  // Close modal when clicking outside content
  window.onclick = function(e) {
    const modal = document.getElementById("readerModal");
    if (e.target === modal) closeModal();
  }

  // Populate both grids
  buildCards(books, "bookGrid");
  buildCards(poems, "poemGrid");
</script>

</body>
</html>
